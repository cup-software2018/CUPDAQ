TCB:
  # Basic Settings
  TYPE: 2              # TCB_V2
  CW: 128              # Coincidence Width
  DLY: 0               # Delay
  TM: 3                # Trigger Mode (mapped from TRGON)
  PTRG: 10             # Periodic Trigger rate (mapped from PTRIG)

  # --- F: FADC Path ---
  MTHRF: 10            # Multiplicity
  PSCF: 1              # Prescale
  DTF: 0               # Dead Time
  SWF: [1, 0, 0, 0]    # Trigger Switch (F, SM, SL, I)

  # --- SM: M64ADC for Muon ---
  MTHRSM: 10
  PSCSM: 1
  DTSM: 0
  SWSM: [0, 1, 0, 0]

  # --- SL: M64ADC for LS ---
  MTHRSL: 10
  PSCSL: 1
  DTSL: 0
  SWSL: [1, 1, 0, 0]   # Passive LS trigger logic

  # --- I: SiPM ADC ---
  MTHRI: 4
  PSCI: 1
  DTI: 0
  SWI: [0, 0, 0, 1]